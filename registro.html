<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="registro.css">
</head>
<form id="registerForm" action="/submit" method="post" novalidate> <!-- 'novalidate' desactiva los globos feos por defecto del navegador -->

    <label for="name">Nombre:</label>
    <input type="text" id="name" name="user_name" required>
    <span class="error-msg" id="error-name"></span>

    <label for="email">Correo electrónico:</label>
    <input type="email" id="email" name="user_email" required>
    <span class="error-msg" id="error-email"></span>

    <label for="message">Mensaje:</label>
    <textarea id="message" name="user_message"></textarea>
    <span class="error-msg" id="error-message"></span>

    <label for="rol">Rol:</label>
    <input type="text" id="rol" name="user_rol" required>
    <span class="error-msg" id="error-rol"></span>

    <button type="submit">Enviar</button>
</form>

<script>
document.getElementById('registerForm').addEventListener('submit', function(event) {
    let isValid = true;

    // Obtener campos
    const name = document.getElementById('name');
    const email = document.getElementById('email');
    const rol = document.getElementById('rol');

    // Limpiar errores previos
    document.querySelectorAll('.error-msg').forEach(el => {
        el.textContent = '';
        el.classList.remove('show');
    });
    document.querySelectorAll('input').forEach(input => input.classList.remove('invalid'));

    // Validar Nombre
    if (name.value.trim().length < 3) {
        showError(name, 'error-name', 'El nombre debe tener al menos 3 caracteres.');
        isValid = false;
    }

    // Validar Email
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email.value.trim())) {
        showError(email, 'error-email', 'Introduce un correo electrónico válido.');
        isValid = false;
    }

    // Validar Rol
    if (rol.value.trim().length < 2) {
        showError(rol, 'error-rol', 'Por favor ingresa un rol válido (ej. Vocalista, Guitarrista).');
        isValid = false;
    }

    // Si hay errores, evitar el envío
    if (!isValid) {
        event.preventDefault();
    }
});

function showError(inputElement, errorId, message) {
    inputElement.classList.add('invalid');
    const errorSpan = document.getElementById(errorId);
    errorSpan.textContent = message;
    errorSpan.classList.add('show');
}
</script>
