name: 🚀 Deploy to Vercel

on:
  push:
    branches:
      - main      # Cambia a 'develop' si tu rama principal es develop
  workflow_dispatch:   # Permite ejecutarlo manualmente desde GitHub Actions

jobs:
  deploy:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Instalar dependencias del proyecto React/Vite
      - name: 📦 Install dependencies
        run: npm install --no-audit --no-fund

      # 4. Construir el bundle de producción (genera la carpeta /dist)
      # SEGURIDAD (Clickjacking): El archivo vercel.json en la raíz del proyecto
      # configura los encabezados X-Frame-Options: DENY y CSP frame-ancestors: none
      # que Vercel aplicará automáticamente al servir los archivos del /dist.
      - name: 🏗️ Build production bundle
        run: npm run build

      # 5. Desplegar a Vercel usando el token secreto del repositorio
      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # working-directory apunta a la raíz del proyecto (donde está vercel.json)
          working-directory: ./
          # --prod despliega a producción (no a preview)
          vercel-args: '--prod'
