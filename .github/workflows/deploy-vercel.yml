name: 🚀 Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Instalar dependencias del proyecto React/Vite
      - name: 📦 Install dependencies
        run: npm install --no-audit --no-fund

      # 4. Instalar el CLI oficial de Vercel en su versión más reciente
      - name: 📡 Install Vercel CLI (latest)
        run: npm install --global vercel@latest

      # 5. Vincular el proyecto a Vercel (genera .vercel/project.json en el runner)
      - name: 🔗 Link project to Vercel
        run: vercel link --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 6. Construir con vercel build (genera .vercel/output, no /dist)
      # SEGURIDAD (Clickjacking): Vercel lee el vercel.json de la raíz del
      # proyecto e inyecta X-Frame-Options: DENY y CSP frame-ancestors: none
      # en los headers de producción automáticamente durante este paso.
      - name: 🏗️ Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 7. Desplegar a producción en Vercel el build ya generado
      - name: 🚀 Deploy to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

